<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Survey Perokok</title>
</head>
<body>
    <h1 align="center">Form Survey Perokok di Indonesia</h1>
    <form action="">
        <div>
            <label for="nama">Nama: </label>
            <input type="text" name="nama" id="nama" placeholder="Masukkan nama">
        </div>
        <br>
        <div>
            <label for="umur">Umur: </label>
            <input type="number" name="umur" id="umur" placeholder="Masukkan umur">
        </div>
        <br>
        <div>
            <label for="gender">Jenis Kelamin</label> <br>
            <input type="radio" name="gender" id="L"><label for="L">Laki-Laki</label> <br>
            <input type="radio" name="gender" id="P"><label for="P">Perempuan</label>
        </div>
        <br>
        <div>
            <label for="">Apakah anda seorang perokok?</label>
            <select name="" id="">
                <option value="" disabled selected>Pilih</option>
                <option value="perokok">Perokok</option>
                <option value="bukan">Bukan Perokok</option>
            </select>
        </div>
        <br>
        <div>
            <label for="">Brand rokok apa yang digunakan:</label>
            <div>
                <input type="checkbox" name="sampoerna" id="sampoerna">
                <label for="sampoerna">Sampoerna</label>
            </div>
            <div>
                <input type="checkbox" name="dio" id="dio">
                <label for="dio">Dio</label>
            </div>
            <div>
                <input type="checkbox" name="magnum" id="magnum">
                <label for="magnum">Magnum</label>
            </div>
            <div>
                <input type="checkbox" name="Surya" id="Surya">
                <label for="Surya">Surya</label>
            </div>
        </div>
        <br>
        <div>
            <input type="button" value="Sumbit"> 
        </div>
    </form>
</body>
</html>
